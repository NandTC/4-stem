name: Build 4-Stem

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flask audio-separator onnxruntime imageio-ffmpeg pyinstaller

      - name: Build Python sidecar
        working-directory: python
        run: pyinstaller sidecar.spec --distpath dist --workpath build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Mac DMG
        run: npm run build:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --title "4-Stem $TAG" --notes "AI 4-Stem Audio Separator — Mac + Windows" 2>/dev/null || true
          gh release upload "$TAG" dist/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install flask audio-separator onnxruntime imageio-ffmpeg pyinstaller

      - name: Build Python sidecar
        working-directory: python
        run: pyinstaller sidecar.spec --distpath dist --workpath build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Release
        run: |
          $TAG = "${{ github.ref_name }}"
          gh release create $TAG --title "4-Stem $TAG" --notes "AI 4-Stem Audio Separator — Mac + Windows" 2>$null
          gh release upload $TAG (Get-ChildItem dist\*.exe).FullName --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
